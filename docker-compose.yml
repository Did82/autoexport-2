services:
  autoexport:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoexport
    restart: unless-stopped
    init: true
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      APP_TIMEZONE: Europe/Minsk
      CONFIG_PATH: /app/data/config.json
      DATABASE_PATH: /app/data/autoexport.db
      # Используются при первом запуске, пока config.json ещё не создан.
      SRC_PATH: /mnt/ftp
      DEST_PATH: /mnt/smb
      SRC_DISK_LIMIT: ${SRC_DISK_LIMIT:-78}
      DEST_DISK_LIMIT: ${DEST_DISK_LIMIT:-78}
      CLEANUP_DAYS: ${CLEANUP_DAYS:-90}
      QUARANTINE_DAYS: ${QUARANTINE_DAYS:-7}
    volumes:
      - /mnt/ftp:/mnt/ftp
      - /mnt/smb:/mnt/smb
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3001/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

